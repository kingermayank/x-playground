<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A tactile lunar transmission resolved by a draggable scan beam.">
    <title>Signal Descent — Experiments</title>
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem('always-cooking-theme');
          document.documentElement.dataset.theme = savedTheme === 'arcade' ? 'arcade' : 'archive';
        } catch {
          document.documentElement.dataset.theme = 'archive';
        }
      })();
    </script>
    <link rel="stylesheet" href="../experiment.css">
  </head>
  <body>
    <header class="project-title-bar">
      <a class="back-link" href="../../?v=20260721">Back to Experiments</a>
      <button class="theme-toggle" type="button" role="switch" aria-checked="false" aria-label="Use Arcade theme" data-theme-toggle>
        <span>Archive</span>
        <span class="theme-toggle-track" aria-hidden="true"><span></span></span>
        <span>Arcade</span>
      </button>
      <div class="project-title-row">
        <h1>Signal Descent</h1>
        <time class="project-date" datetime="2026-07-20">Jul 20, 2026</time>
      </div>
      <p class="project-description">Scrub a transmission beam across lunar noise to resolve the moment Tranquility Base came through.</p>
    </header>
    <main class="experiment-shell">
      <div class="experiment-stage-wrap">
        <section class="stage-card signal-stage" aria-label="Signal Descent interactive transmission">
          <canvas id="signalCanvas" tabindex="0" aria-describedby="signalInstructions"></canvas>
          <div class="signal-hud">
            <div class="signal-readout">
              <span>DOWNLINK</span>
              <strong id="signalReadout">ACQUIRING · 18%</strong>
            </div>
            <p id="signalInstructions">Drag or use arrow keys to resolve the signal. Home resets.</p>
            <button class="material-button" id="signalReset" type="button">Reset scan</button>
          </div>
          <p class="visually-hidden" id="signalStatus" aria-live="polite">Signal acquiring at 18 percent.</p>
        </section>
      </div>
    </main>
    <script type="module" src="../../src/theme.js"></script>
    <script type="module" src="./signal-descent.js"></script>
  </body>
</html>
